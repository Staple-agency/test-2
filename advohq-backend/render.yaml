services:
  - type: web
    name: advohq-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: advohq-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false                  # Set manually in Render dashboard after Vercel deploy

databases:
  - name: advohq-db
    databaseName: advohq
    user: advohq
    plan: free
